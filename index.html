<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdHelp - Financement sans commission</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        
        body { 
            background: #f8fafc; 
            color: #1e293b; 
            line-height: 1.5; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        
        header { 
            background: white; 
            padding: 20px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        
        h1 { 
            font-size: 24px; 
            font-weight: 600; 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .btn { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-decoration: none; 
            display: inline-block; 
        }
        
        .btn:hover { 
            background: #2563eb; 
            transform: translateY(-1px); 
            box-shadow: 0 4px 6px -1px rgba(59,130,246,0.3); 
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid #3b82f6; 
            color: #3b82f6; 
        }
        
        .btn-outline:hover { 
            background: #eff6ff; 
            box-shadow: none; 
            transform: none; 
        }
        
        .btn-success { 
            background: #10b981; 
        }
        
        .btn-success:hover { 
            background: #059669; 
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            margin-bottom: 24px; 
            transition: all 0.2s; 
        }
        
        .post { 
            position: relative; 
            border-left: 4px solid transparent; 
        }
        
        .post.boosted { 
            border-left-color: #f59e0b; 
            background: linear-gradient(to right, #fff, #fffbeb); 
        }
        
        .badge { 
            background: #f59e0b; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 600; 
            display: inline-block; 
            margin-bottom: 10px; 
        }
        
        .badge-verified { 
            background: #10b981; 
        }
        
        .progress-bar { 
            height: 10px; 
            background: #e2e8f0; 
            border-radius: 10px; 
            margin: 15px 0; 
            overflow: hidden; 
        }
        
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6); 
            width: 0%; 
            transition: width 0.3s; 
        }
        
        .meta { 
            color: #64748b; 
            font-size: 14px; 
            margin: 10px 0; 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
        }
        
        .flex { 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            flex-wrap: wrap; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
        }
        
        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 6px; 
            color: #334155; 
            font-size: 14px; 
        }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 14px; 
            transition: border 0.2s; 
        }
        
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1); 
        }
        
        .auth-form { 
            max-width: 400px; 
            margin: 20px auto; 
        }
        
        .hidden { 
            display: none; 
        }
        
        .error { color: #ef4444; }
        .success { color: #10b981; }
        
        .contribute-form { 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #e2e8f0; 
        }
        
        /* Feed des dons */
        .feed-container { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 30px; 
            max-height: 400px; 
            overflow-y: auto; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        
        .feed-item { 
            padding: 12px; 
            border-bottom: 1px solid #f1f5f9; 
            animation: fadeIn 0.3s; 
        }
        
        .feed-item:last-child { 
            border-bottom: none; 
        }
        
        .feed-header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
        }
        
        .feed-name { 
            font-weight: 600; 
            color: #3b82f6; 
        }
        
        .feed-amount { 
            font-weight: 600; 
            color: #10b981; 
        }
        
        .feed-message { 
            margin-top: 5px; 
            font-size: 13px; 
            color: #475569; 
        }
        
        .feed-badge { 
            display: inline-block; 
            background: #f1f5f9; 
            border-radius: 20px; 
            padding: 2px 8px; 
            font-size: 10px; 
            margin-right: 5px; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Section questions/réponses */
        .qa-container { 
            margin-top: 20px; 
        }
        
        .qa-item { 
            padding: 15px; 
            background: #f8fafc; 
            border-radius: 12px; 
            margin-bottom: 10px; 
        }
        
        .qa-question { 
            font-weight: 600; 
            margin-bottom: 5px; 
        }
        
        .qa-answer { 
            color: #475569; 
            font-size: 14px; 
            padding-left: 15px; 
            border-left: 2px solid #3b82f6; 
        }
        
        /* Notification flottante */
        .notification-toast { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #1e293b; 
            color: white; 
            padding: 16px 24px; 
            border-radius: 50px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); 
            z-index: 1000; 
            animation: slideIn 0.3s; 
            max-width: 300px; 
        }
        
        @keyframes slideIn { 
            from { transform: translateX(100px); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        
        /* Badges communautaires */
        .contributor-badge { 
            display: inline-block; 
            background: #f1f5f9; 
            padding: 2px 10px; 
            border-radius: 30px; 
            font-size: 11px; 
            font-weight: 500; 
            margin-right: 5px; 
        }
        
        .badge-founder { background: #f59e0b; color: white; }
        .badge-ambassador { background: #8b5cf6; color: white; }
        .badge-first { background: #3b82f6; color: white; }
        
        /* Compteur en direct */
        .live-counter { 
            background: #ef4444; 
            color: white; 
            border-radius: 30px; 
            padding: 4px 12px; 
            font-size: 12px; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
        }
        
        .live-counter::before { 
            content: ''; 
            width: 8px; 
            height: 8px; 
            background: white; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 
            0% { opacity: 1; } 
            50% { opacity: 0.5; } 
            100% { opacity: 1; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ CrowdHelp - Financement sans commission</h1>
            <div id="auth-buttons">
                <button class="btn" id="login-btn">Connexion</button>
                <button class="btn btn-outline" id="signup-btn">Inscription</button>
                <button class="btn btn-danger hidden" id="logout-btn">Déconnexion</button>
            </div>
        </header>

        <!-- Formulaire de connexion/inscription -->
        <div id="auth-forms" class="card auth-form hidden">
            <h2 id="auth-title">Connexion</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="auth-email" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <div class="flex">
                <button class="btn" id="auth-submit">Valider</button>
                <button class="btn btn-outline" id="auth-toggle">Créer un compte</button>
            </div>
            <div id="auth-message"></div>
        </div>

        <!-- Formulaire de création de post -->
        <div id="new-post-form" class="card hidden">
            <h2>🚀 Lancer un projet</h2>
            <div class="form-group">
                <label>Titre du projet</label>
                <input type="text" id="post-title" placeholder="Ex: Achat de chaussures de sport" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="post-description" rows="3" placeholder="Décrivez votre projet..."></textarea>
            </div>
            <div class="form-group">
                <label>Montant cible (€)</label>
                <input type="number" id="post-target" min="1" step="0.01" placeholder="150" required>
            </div>
            <div class="form-group">
                <label>Votre email PayPal (pour recevoir les dons)</label>
                <input type="email" id="post-paypal" placeholder="votre-paypal@email.com" required>
            </div>
            <div class="form-group">
                <label>Budget détaillé (optionnel)</label>
                <textarea id="post-budget" rows="3" placeholder="Expliquez comment les fonds seront utilisés..."></textarea>
            </div>
            <button class="btn" id="submit-post">Publier le projet</button>
            <div id="post-message"></div>
        </div>

        <!-- Statistiques globales -->
        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <div class="stat-value" id="total-projects">0</div>
                <div class="stat-label">Projets actifs</div>
            </div>
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <div class="stat-value" id="total-donations">0 €</div>
                <div class="stat-label">Total des dons</div>
            </div>
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <div class="stat-value" id="total-contributors">0</div>
                <div class="stat-label">Contributeurs</div>
            </div>
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <div class="stat-value" id="avg-donation">0 €</div>
                <div class="stat-label">Don moyen</div>
            </div>
        </div>

        <!-- Feed des dons en direct -->
        <div class="feed-container" id="feed-container">
            <div class="flex" style="justify-content: space-between; margin-bottom: 15px;">
                <h3>📢 Dons en direct</h3>
                <span class="live-counter" id="live-counter">0 contributeurs</span>
            </div>
            <div id="feed-list"></div>
        </div>

        <!-- Classement des contributeurs -->
        <div class="ranking-container" style="background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            <h3 class="ranking-title" style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">🏆 Top contributeurs</h3>
            <div class="ranking-list" id="ranking-list"></div>
        </div>

        <!-- Filtres -->
        <div class="filter-bar" style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;">
            <select class="filter-select" id="sort-filter" style="width: 200px; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <option value="boosted">🔥 Boostés d'abord</option>
                <option value="recent">📅 Plus récents</option>
                <option value="popular">⭐ Plus populaires</option>
                <option value="progress">📊 Progression</option>
            </select>
            <input type="text" class="search-input" id="search-filter" placeholder="🔍 Rechercher un projet..." style="flex: 1; min-width: 250px; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0;">
        </div>

        <!-- Liste des posts -->
        <div id="posts-container">
            <h2>📋 Projets en cours</h2>
            <div id="posts-list"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://ylrseemuvxogyopwqrnr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscnNlZW11dnhvZ3lvcHdycW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDA1MzIsImV4cCI6MjA4ODExNjUzMn0.Bc1yhbVNbLGU_bMQBjecXe0Is-WtZMWXALcW-oWYkPA';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // État global
        let currentUser = null;
        let isLoginMode = true;
        let allPosts = [];
        let allContributions = [];
        let realtimeChannel = null;

        // Éléments DOM
        const authButtons = document.getElementById('auth-buttons');
        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authForms = document.getElementById('auth-forms');
        const authTitle = document.getElementById('auth-title');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authSubmit = document.getElementById('auth-submit');
        const authToggle = document.getElementById('auth-toggle');
        const authMessage = document.getElementById('auth-message');
        const newPostForm = document.getElementById('new-post-form');
        const postTitle = document.getElementById('post-title');
        const postDescription = document.getElementById('post-description');
        const postTarget = document.getElementById('post-target');
        const postPaypal = document.getElementById('post-paypal');
        const postBudget = document.getElementById('post-budget');
        const submitPost = document.getElementById('submit-post');
        const postMessage = document.getElementById('post-message');
        const postsList = document.getElementById('posts-list');
        const sortFilter = document.getElementById('sort-filter');
        const searchFilter = document.getElementById('search-filter');
        const feedList = document.getElementById('feed-list');
        const liveCounter = document.getElementById('live-counter');
        const totalProjectsEl = document.getElementById('total-projects');
        const totalDonationsEl = document.getElementById('total-donations');
        const totalContributorsEl = document.getElementById('total-contributors');
        const avgDonationEl = document.getElementById('avg-donation');
        const rankingListEl = document.getElementById('ranking-list');

        // ========== AUTHENTIFICATION ==========
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            updateUI();
            loadData();
            setupRealtime();
        }
        checkUser();

        function updateUI() {
            if (currentUser) {
                loginBtn.classList.add('hidden');
                signupBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                newPostForm.classList.remove('hidden');
                authForms.classList.add('hidden');
            } else {
                loginBtn.classList.remove('hidden');
                signupBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                newPostForm.classList.add('hidden');
            }
        }

        loginBtn.addEventListener('click', () => {
            isLoginMode = true;
            authTitle.textContent = 'Connexion';
            authForms.classList.remove('hidden');
        });

        signupBtn.addEventListener('click', () => {
            isLoginMode = false;
            authTitle.textContent = 'Inscription';
            authForms.classList.remove('hidden');
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            currentUser = null;
            updateUI();
            loadData();
        });

        authToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.textContent = isLoginMode ? 'Connexion' : 'Inscription';
        });

        authSubmit.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            
            if (!email || !password) {
                authMessage.textContent = 'Veuillez remplir tous les champs';
                authMessage.className = 'error';
                return;
            }

            let result;
            if (isLoginMode) {
                result = await supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await supabase.auth.signUp({ email, password });
            }

            if (result.error) {
                authMessage.textContent = result.error.message;
                authMessage.className = 'error';
            } else {
                if (isLoginMode) {
                    currentUser = result.data.user;
                    authMessage.textContent = 'Connexion réussie !';
                    authMessage.className = 'success';
                    updateUI();
                    authForms.classList.add('hidden');
                } else {
                    authMessage.textContent = 'Inscription réussie ! Vérifiez votre email.';
                    authMessage.className = 'success';
                }
                authEmail.value = '';
                authPassword.value = '';
            }
        });

        // ========== REALTIME ==========
        function setupRealtime() {
            if (realtimeChannel) {
                supabase.removeChannel(realtimeChannel);
            }
            realtimeChannel = supabase
                .channel('public:contributions')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'contributions' }, payload => {
                    // Nouvelle contribution
                    const newContrib = payload.new;
                    allContributions.push(newContrib);
                    updateFeed(newContrib);
                    updateStats();
                    applyFilters(); // pour mettre à jour les totaux des posts
                    showNotification(newContrib);
                })
                .subscribe();
        }

        function showNotification(contrib) {
            // Afficher une notification si le montant est >= 100€ (ou autre seuil)
            if (contrib.amount >= 100) {
                const name = contrib.contributor_name || 'Anonyme';
                const toast = document.createElement('div');
                toast.className = 'notification-toast';
                toast.innerHTML = `🎉 ${name} vient de donner ${contrib.amount}€ !`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 5000);
            }
        }

        // ========== CHARGEMENT DES DONNÉES ==========
        async function loadData() {
            // Charger tous les posts
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erreur chargement posts:', error);
                return;
            }

            // Charger toutes les contributions
            const { data: contributions, error: contribError } = await supabase
                .from('contributions')
                .select('*')
                .order('created_at', { ascending: false });

            if (contribError) {
                console.error('Erreur chargement contributions:', contribError);
                return;
            }

            allContributions = contributions || [];
            
            // Calculer les totaux par post
            const postsWithTotal = posts.map(post => {
                const postContributions = allContributions.filter(c => c.post_id === post.id);
                const total = postContributions.reduce((acc, c) => acc + parseFloat(c.amount), 0);
                return { ...post, total, contributions: postContributions };
            });

            allPosts = postsWithTotal;
            updateStats();
            updateFeedAll();
            applyFilters();
        }

        // ========== STATISTIQUES GLOBALES ==========
        function updateStats() {
            // Nombre de projets actifs
            totalProjectsEl.textContent = allPosts.length;

            // Total des dons
            const totalDonations = allContributions.reduce((acc, c) => acc + parseFloat(c.amount), 0);
            totalDonationsEl.textContent = totalDonations.toFixed(2) + ' €';

            // Nombre de contributeurs uniques
            const uniqueContributors = new Set(allContributions.map(c => c.contributor_name)).size;
            totalContributorsEl.textContent = uniqueContributors;

            // Don moyen
            const avgDonation = allContributions.length > 0 ? totalDonations / allContributions.length : 0;
            avgDonationEl.textContent = avgDonation.toFixed(2) + ' €';

            // Mise à jour du compteur live
            liveCounter.textContent = `${allContributions.length} dons`;

            // Classement des contributeurs
            const contributorTotals = {};
            allContributions.forEach(c => {
                const name = c.contributor_name || 'Anonyme';
                contributorTotals[name] = (contributorTotals[name] || 0) + parseFloat(c.amount);
            });

            const ranking = Object.entries(contributorTotals)
                .map(([name, total]) => ({ name, total }))
                .sort((a, b) => b.total - a.total)
                .slice(0, 10);

            rankingListEl.innerHTML = ranking.map((item, index) => {
                let positionClass = '';
                if (index === 0) positionClass = 'gold';
                else if (index === 1) positionClass = 'silver';
                else if (index === 2) positionClass = 'bronze';
                
                return `
                    <div class="ranking-item" style="display: flex; align-items: center; gap: 15px; padding: 10px; background: #f8fafc; border-radius: 12px; margin-bottom: 5px;">
                        <div class="ranking-position" style="width: 30px; height: 30px; background: #3b82f6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; ${positionClass ? 'background: ' + (index === 0 ? '#f59e0b' : index === 1 ? '#94a3b8' : '#b45309') : ''}">${index + 1}</div>
                        <div class="ranking-info" style="flex: 1;">
                            <div class="ranking-name" style="font-weight: 600;">${item.name}</div>
                            <div class="ranking-amount" style="font-size: 14px; color: #3b82f6;">${item.total.toFixed(2)} €</div>
                        </div>
                    </div>
                `;
            }).join('');

            if (ranking.length === 0) {
                rankingListEl.innerHTML = '<p style="text-align: center; color: #64748b; padding: 20px;">Aucun contributeur pour le moment</p>';
            }
        }

        // ========== FEED DES DONS ==========
        function updateFeedAll() {
            // Afficher les 20 dernières contributions
            const recent = allContributions.slice(0, 20);
            feedList.innerHTML = recent.map(c => {
                const name = c.contributor_name || 'Anonyme';
                const message = c.message ? `"${c.message}"` : '';
                return `
                    <div class="feed-item">
                        <div class="feed-header">
                            <span class="feed-name">${name}</span>
                            <span class="feed-amount">${c.amount} €</span>
                        </div>
                        ${message ? `<div class="feed-message">${message}</div>` : ''}
                        <div style="font-size: 10px; color: #94a3b8; margin-top: 5px;">${new Date(c.created_at).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }

        function updateFeed(newContrib) {
            // Ajouter en haut du feed
            const name = newContrib.contributor_name || 'Anonyme';
            const message = newContrib.message ? `"${newContrib.message}"` : '';
            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerHTML = `
                <div class="feed-header">
                    <span class="feed-name">${name}</span>
                    <span class="feed-amount">${newContrib.amount} €</span>
                </div>
                ${message ? `<div class="feed-message">${message}</div>` : ''}
                <div style="font-size: 10px; color: #94a3b8; margin-top: 5px;">À l'instant</div>
            `;
            feedList.prepend(item);
            if (feedList.children.length > 20) {
                feedList.lastElementChild.remove();
            }
        }

        // ========== FILTRES ==========
        function applyFilters() {
            let filtered = [...allPosts];
            
            const searchTerm = searchFilter.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(post => 
                    post.title.toLowerCase().includes(searchTerm) || 
                    (post.description && post.description.toLowerCase().includes(searchTerm))
                );
            }

            const sortValue = sortFilter.value;
            filtered.sort((a, b) => {
                const aBoosted = a.boost_expires_at && new Date(a.boost_expires_at) > new Date();
                const bBoosted = b.boost_expires_at && new Date(b.boost_expires_at) > new Date();
                
                switch(sortValue) {
                    case 'boosted':
                        if (aBoosted && !bBoosted) return -1;
                        if (!aBoosted && bBoosted) return 1;
                        return new Date(b.created_at) - new Date(a.created_at);
                    
                    case 'recent':
                        return new Date(b.created_at) - new Date(a.created_at);
                    
                    case 'popular':
                        const aContrib = allContributions.filter(c => c.post_id === a.id).length;
                        const bContrib = allContributions.filter(c => c.post_id === b.id).length;
                        return bContrib - aContrib;
                    
                    case 'progress':
                        const aProgress = (a.total / a.target_amount) * 100;
                        const bProgress = (b.total / b.target_amount) * 100;
                        return bProgress - aProgress;
                    
                    default:
                        return 0;
                }
            });

            displayPosts(filtered);
        }

        sortFilter.addEventListener('change', applyFilters);
        searchFilter.addEventListener('input', applyFilters);

        // ========== CRÉATION DE PROJET ==========
        submitPost.addEventListener('click', async () => {
            if (!currentUser) {
                postMessage.textContent = 'Vous devez être connecté';
                postMessage.className = 'error';
                return;
            }

            const title = postTitle.value.trim();
            const description = postDescription.value.trim();
            const target = parseFloat(postTarget.value);
            const paypal = postPaypal.value.trim();
            const budget = postBudget.value.trim();

            if (!title || !description || !target || !paypal) {
                postMessage.textContent = 'Tous les champs sont requis';
                postMessage.className = 'error';
                return;
            }

            if (target <= 0) {
                postMessage.textContent = 'Le montant doit être positif';
                postMessage.className = 'error';
                return;
            }

            const { error } = await supabase.from('posts').insert([
                {
                    user_id: currentUser.id,
                    title,
                    description,
                    target_amount: target,
                    paypal_email: paypal,
                    budget_detail: budget,
                    verified: false // à gérer manuellement par un admin
                }
            ]);

            if (error) {
                postMessage.textContent = error.message;
                postMessage.className = 'error';
            } else {
                postMessage.textContent = 'Projet créé avec succès !';
                postMessage.className = 'success';
                postTitle.value = '';
                postDescription.value = '';
                postTarget.value = '';
                postPaypal.value = '';
                postBudget.value = '';
                loadData();
            }
        });

        // ========== AFFICHAGE DES PROJETS ==========
        function displayPosts(posts) {
            if (posts.length === 0) {
                postsList.innerHTML = '<p style="text-align: center; padding: 40px; color: #64748b;">Aucun projet trouvé.</p>';
                return;
            }

            postsList.innerHTML = posts.map(post => {
                const progress = Math.min((post.total / post.target_amount) * 100, 100);
                const isBoosted = post.boost_expires_at && new Date(post.boost_expires_at) > new Date();
                const daysLeft = isBoosted ? Math.ceil((new Date(post.boost_expires_at) - new Date()) / (1000 * 60 * 60 * 24)) : 0;
                const contributorCount = allContributions.filter(c => c.post_id === post.id).length;
                const isVerified = post.verified; // champ à ajouter en base
                
                return `
                    <div class="card post ${isBoosted ? 'boosted' : ''}" data-id="${post.id}" data-paypal="${post.paypal_email}" data-title="${post.title}">
                        <div class="flex" style="justify-content: space-between;">
                            <h3 style="font-size: 18px;">${post.title}</h3>
                            <div>
                                ${isVerified ? '<span class="badge badge-verified">✅ Vérifié</span>' : ''}
                                ${isBoosted ? '<span class="badge">🔥 Boosté (' + daysLeft + 'j)</span>' : ''}
                            </div>
                        </div>
                        <p style="color: #475569; margin: 10px 0;">${post.description}</p>
                        
                        ${post.budget_detail ? `
                            <details style="margin: 10px 0;">
                                <summary style="cursor: pointer; color: #3b82f6;">Voir le budget détaillé</summary>
                                <p style="margin-top: 10px; padding: 10px; background: #f8fafc; border-radius: 8px;">${post.budget_detail}</p>
                            </details>
                        ` : ''}
                        
                        <div class="meta">
                            <span>🎯 Objectif: ${post.target_amount} €</span>
                            <span>💰 Récolté: ${post.total.toFixed(2)} €</span>
                            <span>👥 ${contributorCount} contributeur${contributorCount > 1 ? 's' : ''}</span>
                            <span>📅 ${new Date(post.created_at).toLocaleDateString()}</span>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>

                        <div class="flex" style="justify-content: space-between; margin-top: 15px;">
                            <button class="btn contribute-btn">Contribuer à ce projet</button>
                            <button class="btn btn-outline boost-btn" data-post-id="${post.id}">Booster (5€)</button>
                        </div>

                        <div class="contribute-form hidden">
                            <h4 style="margin-bottom: 15px;">Faire un don</h4>
                            <div class="form-group">
                                <label>Montant (€)</label>
                                <input type="number" class="contribute-amount" min="1" step="0.01" placeholder="10">
                            </div>
                            <div class="form-group">
                                <label>Votre nom (public, optionnel)</label>
                                <input type="text" class="contributor-name" placeholder="Anonyme">
                            </div>
                            <div class="form-group">
                                <label>Message (optionnel)</label>
                                <input type="text" class="contributor-message" placeholder="Bravo !">
                            </div>
                            <div class="paypal-button-container" id="paypal-button-${post.id}"></div>
                        </div>

                        <!-- Section questions/réponses (à développer) -->
                        <div class="qa-container" style="margin-top: 20px;">
                            <h4>Questions / Réponses</h4>
                            <div id="qa-${post.id}">
                                <!-- À implémenter avec une table questions -->
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Ajouter les écouteurs pour les boutons "Contribuer"
            document.querySelectorAll('.contribute-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.post');
                    const form = card.querySelector('.contribute-form');
                    form.classList.toggle('hidden');
                    
                    if (!form.classList.contains('hidden')) {
                        const postId = card.dataset.id;
                        const paypalEmail = card.dataset.paypal;
                        const postTitle = card.dataset.title;
                        initPayPalButton(postId, paypalEmail, postTitle);
                    }
                });
            });

            // Boutons "Booster"
            document.querySelectorAll('.boost-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.postId;
                    
                    const boostAmount = 5;
                    const sitePaypal = 'sb-paypal@crowdhelp.com'; // À remplacer par votre vrai email PayPal
                    
                    const paypalUrl = `https://www.sandbox.paypal.com/cgi-bin/webscr?cmd=_donations&business=${sitePaypal}&item_name=Boost%20projet%20${postId}&amount=${boostAmount}&currency_code=EUR`;
                    
                    window.open(paypalUrl, '_blank');

                    const expiresAt = new Date();
                    expiresAt.setHours(expiresAt.getHours() + 24);
                    
                    const { error } = await supabase
                        .from('posts')
                        .update({ boost_expires_at: expiresAt.toISOString() })
                        .eq('id', postId);

                    if (!error) {
                        loadData();
                    }
                });
            });
        }

        // ========== INITIALISATION PAYPAL ==========
        function initPayPalButton(postId, paypalEmail, postTitle) {
            const container = document.getElementById(`paypal-button-${postId}`);
            if (!container) return;

            container.innerHTML = '';

            const card = document.querySelector(`.post[data-id="${postId}"]`);
            const amountInput = card.querySelector('.contribute-amount');
            const nameInput = card.querySelector('.contributor-name');
            const messageInput = card.querySelector('.contributor-message');

            const button = document.createElement('button');
            button.className = 'btn';
            button.textContent = 'Payer avec PayPal';
            button.style.background = '#00457C';
            button.style.width = '100%';
            button.style.padding = '12px';
            
            button.addEventListener('click', () => {
                const amount = parseFloat(amountInput.value);
                if (!amount || amount < 1) {
                    alert('Veuillez saisir un montant valide (minimum 1€)');
                    return;
                }

                const name = nameInput.value.trim() || 'Anonyme';
                const message = messageInput.value.trim() || '';

                const paypalUrl = `https://www.sandbox.paypal.com/cgi-bin/webscr?cmd=_donations&business=${paypalEmail}&item_name=${encodeURIComponent(postTitle)}&amount=${amount}&currency_code=EUR`;
                
                window.open(paypalUrl, '_blank');

                saveContribution(postId, amount, name, message);
            });

            container.appendChild(button);
        }

        // ========== ENREGISTRER UNE CONTRIBUTION ==========
        async function saveContribution(postId, amount, contributorName, message) {
            const { error } = await supabase.from('contributions').insert([
                { 
                    post_id: postId, 
                    amount: amount, 
                    contributor_name: contributorName,
                    message: message
                }
            ]);

            if (!error) {
                // La mise à jour se fera via Realtime
            }
        }

        // ========== INITIALISATION ==========
        window.addEventListener('load', () => {
            loadData();
        });
    </script>
</body>
</html>
