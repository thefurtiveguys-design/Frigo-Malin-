<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova · Espace de travail</title>
    <style>
        /* === RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background: #0b0b0f;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            color: #fff;
        }

        .edit-input, 
        .edit-textarea,
        input[type="text"],
        textarea,
        select {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }

        /* === CANVAS INFINI === */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0b0f;
            background-image: 
                linear-gradient(rgba(74, 158, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 158, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            cursor: default;
            transition: background-size 0.2s;
            z-index: 1;
        }

        #canvas.show-grid {
            background-size: 20px 20px;
        }

        #objects-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 10000px;
            height: 10000px;
            transform-origin: 0 0;
            will-change: transform;
            z-index: 2;
        }

        /* === CANVAS DE DESSIN (placé sous les cartes) === */
        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5; /* Sous les cartes (z-index:10) */
        }

        #draw-canvas.active {
            pointer-events: all;
        }

        /* === STYLE DES CARTES === */
        .card {
            position: absolute;
            width: 260px;
            background: rgba(22, 24, 29, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
            transition: border 0.2s, box-shadow 0.2s, filter 0.3s;
            cursor: grab;
            z-index: 10;
        }

        .card.drag-disabled {
            cursor: default;
        }

        .card.drag-disabled:active {
            cursor: default;
        }

        .card:active {
            cursor: grabbing;
        }

        .card.selected {
            border: 2px solid #4a9eff;
            box-shadow: 0 0 0 4px rgba(74, 158, 255, 0.2);
        }

        .card:hover {
            border-color: rgba(74, 158, 255, 0.5);
        }

        /* Mode focus */
        .focus-mode .card:not(.focus-card):not(.connected-to-focus) {
            filter: blur(2px) opacity(0.3);
            pointer-events: none;
        }
        .focus-mode .card.focus-card {
            z-index: 100;
            transform: scale(1.05);
        }

        /* En mode dessin, les cartes sont inactives */
        .draw-mode .card {
            pointer-events: none;
        }

        /* Bouton d'édition */
        .edit-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            z-index: 15;
            pointer-events: auto;
        }

        .card:hover .edit-btn {
            opacity: 1;
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            margin-top: 30px;
        }

        .card-badge {
            background: rgba(74, 158, 255, 0.15);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 500;
            color: #9ac8ff;
            text-transform: uppercase;
            border: 1px solid rgba(74, 158, 255, 0.3);
        }

        .card-title {
            font-weight: 500;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-word;
        }

        .card-content {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
            word-break: break-word;
        }

        .card-footer {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 14px;
        }

        /* Statut visuel */
        .card-status {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid;
        }
        .status-todo { border-color: #f39c12; color: #f39c12; }
        .status-doing { border-color: #3498db; color: #3498db; }
        .status-done { border-color: #2ecc71; color: #2ecc71; }
        .status-blocked { border-color: #e74c3c; color: #e74c3c; }

        /* Sélecteur de couleur */
        .color-options {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5);
        }

        .color-option.white {
            border: 2px solid rgba(255,255,255,0.3);
        }
        .color-option.white.selected {
            border-color: #4a9eff;
        }
        .color-option.black {
            border: 2px solid rgba(255,255,255,0.3);
        }
        .color-option.black.selected {
            border-color: #4a9eff;
        }

        /* === POINTS DE CONNEXION === */
        .connection-point {
            position: absolute;
            width: 14px;
            height: 14px;
            background: rgba(74, 158, 255, 0.2);
            border: 2px solid #4a9eff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
            cursor: crosshair;
            z-index: 30;
            opacity: 0;
            pointer-events: all;
        }

        .card:hover .connection-point {
            opacity: 1;
        }

        .connection-point:hover {
            background: #4a9eff;
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 20px #4a9eff;
        }

        .connection-point.dragging {
            opacity: 1;
            background: #4a9eff;
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 30px #4a9eff;
            z-index: 100;
        }

        .connection-point.north { top: 0; left: 50%; }
        .connection-point.south { top: 100%; left: 50%; }
        .connection-point.east { top: 50%; left: 100%; }
        .connection-point.west { top: 50%; left: 0; }

        /* Carte cible pendant le drag de connexion */
        .card.drop-target {
            border-color: #4a9eff;
            box-shadow: 0 0 0 4px rgba(74, 158, 255, 0.3);
        }

        /* === LIGNES DE CONNEXION === */
        .temp-connection-line {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, #4a9eff, #9b59b6);
            transform-origin: left;
            pointer-events: none;
            z-index: 50;
            opacity: 0.8;
            border-radius: 3px;
            box-shadow: 0 0 15px #4a9eff;
        }

        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, #4a9eff, #9b59b6);
            transform-origin: left;
            pointer-events: all;
            z-index: 5;
            opacity: 0.6;
            border-radius: 2px;
            transition: height 0.2s, opacity 0.2s, background 0.2s;
        }

        .delete-link-mode .connection-line {
            height: 6px;
            opacity: 0.8;
            cursor: pointer;
        }

        .delete-link-mode .connection-line:hover {
            background: #e74c3c;
            opacity: 1;
            box-shadow: 0 0 15px #e74c3c;
        }

        /* === MENU PARAMÈTRES (à gauche) === */
        .settings-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3000;
        }

        .settings-button {
            background: rgba(18, 20, 24, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .settings-button:hover {
            background: rgba(40, 42, 48, 0.9);
        }

        .settings-menu {
            position: absolute;
            top: 60px;
            left: 0;
            width: 280px;
            background: rgba(18, 20, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            color: white;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
        }

        .settings-menu.visible {
            display: block;
        }

        .settings-menu h4 {
            margin-bottom: 15px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        .settings-item {
            margin-bottom: 20px;
        }

        .settings-item label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox input {
            width: 16px;
            height: 16px;
        }

        .card-list {
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }

        .card-list-item {
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            font-size: 13px;
        }

        .card-list-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .card-list-item .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* === BARRE D'OUTILS PRINCIPALE === */
        .toolbar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .toolbar {
            background: rgba(18, 20, 24, 0.85);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            gap: 2px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s, transform 0.3s;
        }

        .toolbar.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .tool-group {
            display: flex;
            gap: 2px;
            padding: 0 4px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-group:last-child {
            border-right: none;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .tool-btn.primary {
            background: #4a9eff;
            color: white;
        }

        .tool-btn.primary:hover {
            background: #6bb0ff;
        }

        .tool-btn.active {
            background: rgba(74, 158, 255, 0.25);
            color: #4a9eff;
        }

        .toggle-toolbar {
            background: rgba(18, 20, 24, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .toggle-toolbar:hover {
            background: rgba(40, 42, 48, 0.8);
        }

        /* === BARRE D'OUTILS DE DESSIN (contextuelle) === */
        .draw-toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 20, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 16px;
            display: none;
            gap: 16px;
            z-index: 11000;
            align-items: center;
        }

        .draw-toolbar.visible {
            display: flex;
        }

        .draw-tool-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .draw-tool-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .draw-tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .draw-tool-btn.active {
            background: #4a9eff;
            color: white;
        }

        .draw-color-picker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            background: #4a9eff;
        }

        .draw-slider {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .draw-slider-handle {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: -4px;
            transform: translateX(-50%);
            cursor: pointer;
        }

        /* === MINI-CARTE === */
        .minimap {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 200px;
            height: 130px;
            background: rgba(18, 20, 24, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            z-index: 1500;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .minimap-viewport {
            position: absolute;
            border: 2px solid #4a9eff;
            background: rgba(74, 158, 255, 0.1);
            pointer-events: none;
            border-radius: 4px;
            z-index: 2;
        }

        .minimap-dots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .minimap-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #4a9eff;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #4a9eff;
        }

        /* === INDICATEUR DE ZOOM === */
        .zoom-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .zoom-indicator.visible {
            opacity: 1;
        }

        /* === MODE ÉDITION DE CARTE === */
        .edit-card-container {
            padding: 10px;
        }

        .edit-card-container label {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .edit-card-container input,
        .edit-card-container textarea,
        .edit-card-container select {
            margin-bottom: 15px;
        }

        .edit-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: #4a9eff;
            color: white;
        }

        .btn-primary:hover {
            background: #6bb0ff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* === NOTIFICATION === */
        .notification {
            position: fixed;
            bottom: 100px;
            right: 24px;
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-size: 13px;
            z-index: 5000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="canvas">
        <div id="objects-container"></div>
    </div>

    <!-- Canvas de dessin (sous les cartes) -->
    <canvas id="draw-canvas"></canvas>

    <!-- Menu Paramètres (à gauche) -->
    <div class="settings-panel">
        <div class="settings-button" id="settings-button">Paramètres</div>
        <div class="settings-menu" id="settings-menu">
            <h4>Liste des cartes</h4>
            <div class="card-list" id="card-list"></div>
            
            <div style="margin-top: 20px;">
                <h4>Grille magnétique</h4>
                <div class="checkbox">
                    <input type="checkbox" id="grid-checkbox"> <span>Activer la grille (20px)</span>
                </div>
            </div>
            
            <div style="margin-top: 20px;">
                <h4>Raccourcis</h4>
                <div style="font-size:12px; color:rgba(255,255,255,0.6); line-height:1.8;">
                    <p>B : Nouvelle carte</p>
                    <p>L : Mode liaison</p>
                    <p>Ctrl+F : Recherche</p>
                    <p>Espace : Pan (maintenir)</p>
                    <p>Suppr : Supprimer carte</p>
                    <p>Ctrl+Z : Restaurer</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Barre d'outils de dessin -->
    <div class="draw-toolbar" id="draw-toolbar">
        <div class="draw-tool-group">
            <button class="draw-tool-btn" id="draw-pencil">Crayon</button>
            <button class="draw-tool-btn" id="draw-highlighter">Surligneur</button>
            <button class="draw-tool-btn" id="draw-eraser">Gomme</button>
        </div>
        <div class="draw-tool-group">
            <input type="color" id="draw-color" value="#4a9eff" class="draw-color-picker">
        </div>
        <div class="draw-tool-group">
            <div class="draw-slider" id="draw-size-slider">
                <div class="draw-slider-handle" id="draw-size-handle" style="left: 50%;"></div>
            </div>
            <span style="color:white; font-size:12px; width:30px;" id="draw-size-value">5</span>
        </div>
    </div>

    <!-- Barre d'outils principale -->
    <div class="toolbar-container">
        <div class="toolbar" id="toolbar">
            <div class="tool-group">
                <button class="tool-btn" id="zoom-out">−</button>
                <button class="tool-btn" id="zoom-reset">100%</button>
                <button class="tool-btn" id="zoom-in">+</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="add-card">Nouvelle</button>
                <button class="tool-btn" id="delete-card">Supprimer</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="reset-view">Recentrer</button>
                <button class="tool-btn" id="draw-mode">Dessin</button>
                <button class="tool-btn" id="focus-mode">Focus</button>
                <button class="tool-btn" id="delete-link">Supprimer lien</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="history-undo">Restaurer</button>
            </div>
        </div>
        <div class="toggle-toolbar" id="toggle-toolbar">
            <span>▲</span> Masquer la barre
        </div>
    </div>

    <!-- Mini-carte -->
    <div class="minimap" id="minimap">
        <div class="minimap-viewport" id="minimap-viewport"></div>
        <div class="minimap-dots" id="minimap-dots"></div>
    </div>

    <!-- Indicateur de zoom -->
    <div class="zoom-indicator" id="zoom-indicator">100%</div>

    <script>
        (function() {
            // ----- ÉTAT GLOBAL -----
            let cards = [];
            let connections = [];
            let nextId = 1;
            let nextConnId = 1;
            let selectedCardId = null;
            
            let deletedCardsHistory = [];
            const MAX_HISTORY = 5;

            let isEditing = false;
            let isPanning = false;
            let lastPanX, lastPanY;

            let panX = 0, panY = 0;
            let scale = 1;

            let draggedCard = null;
            let dragOffsetX, dragOffsetY;
            let isDraggingCard = false;

            let isDraggingConnection = false;
            let connectionStart = null;
            let tempLine = null;
            let currentDropTarget = null;

            let drawMode = false;
            let drawActive = false;
            let drawTool = 'pencil';
            let drawColor = '#4a9eff';
            let drawSize = 5;
            let drawPoints = [];
            let drawCanvas = document.getElementById('draw-canvas');
            let drawCtx = drawCanvas.getContext('2d');
            let isDrawing = false;
            let lastDrawPoint = null;

            let gridEnabled = false;
            const GRID_SIZE = 20;

            let focusMode = false;
            let focusCardId = null;

            let deleteLinkMode = false;

            let spacePressed = false;

            // Éléments DOM
            const canvas = document.getElementById('canvas');
            const container = document.getElementById('objects-container');
            const zoomIndicator = document.getElementById('zoom-indicator');
            const toolbar = document.getElementById('toolbar');
            const toggleToolbar = document.getElementById('toggle-toolbar');
            const settingsButton = document.getElementById('settings-button');
            const settingsMenu = document.getElementById('settings-menu');
            const gridCheckbox = document.getElementById('grid-checkbox');
            const cardListDiv = document.getElementById('card-list');
            const minimapDots = document.getElementById('minimap-dots');
            
            // Éléments dessin
            const drawToolbar = document.getElementById('draw-toolbar');
            const drawPencil = document.getElementById('draw-pencil');
            const drawHighlighter = document.getElementById('draw-highlighter');
            const drawEraser = document.getElementById('draw-eraser');
            const drawColorPicker = document.getElementById('draw-color');
            const drawSizeSlider = document.getElementById('draw-size-slider');
            const drawSizeHandle = document.getElementById('draw-size-handle');
            const drawSizeValue = document.getElementById('draw-size-value');

            // ----- GESTION BARRE D'OUTILS -----
            toggleToolbar.addEventListener('click', () => {
                toolbar.classList.toggle('hidden');
                toggleToolbar.innerHTML = toolbar.classList.contains('hidden') ? 
                    '<span>▼</span> Afficher la barre' : 
                    '<span>▲</span> Masquer la barre';
            });

            // ----- GESTION MENU PARAMÈTRES -----
            settingsButton.addEventListener('click', () => {
                settingsMenu.classList.toggle('visible');
            });

            document.addEventListener('click', (e) => {
                if (!settingsButton.contains(e.target) && !settingsMenu.contains(e.target)) {
                    settingsMenu.classList.remove('visible');
                }
            });

            gridCheckbox.addEventListener('change', (e) => {
                gridEnabled = e.target.checked;
                canvas.classList.toggle('show-grid', gridEnabled);
            });

            // ----- NOTIFICATION -----
            function showNotification(message) {
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.textContent = message;
                document.body.appendChild(notif);
                
                setTimeout(() => {
                    notif.remove();
                }, 3000);
            }

            // ----- FONCTIONS UTILITAIRES -----
            function getMouseWorldCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                return {
                    x: (mouseX - panX) / scale,
                    y: (mouseY - panY) / scale
                };
            }

            function getMouseScreenCoords(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }

            function snapToGrid(value) {
                if (!gridEnabled) return value;
                return Math.round(value / GRID_SIZE) * GRID_SIZE;
            }

            // ----- GESTION DU DESSIN AMÉLIORÉ -----
            function initDrawTools() {
                // Redimensionner le canvas de dessin
                function resizeDrawCanvas() {
                    drawCanvas.width = window.innerWidth;
                    drawCanvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeDrawCanvas);
                resizeDrawCanvas();

                // Gestion des outils
                drawPencil.addEventListener('click', () => {
                    drawTool = 'pencil';
                    drawPencil.classList.add('active');
                    drawHighlighter.classList.remove('active');
                    drawEraser.classList.remove('active');
                });

                drawHighlighter.addEventListener('click', () => {
                    drawTool = 'highlighter';
                    drawHighlighter.classList.add('active');
                    drawPencil.classList.remove('active');
                    drawEraser.classList.remove('active');
                });

                drawEraser.addEventListener('click', () => {
                    drawTool = 'eraser';
                    drawEraser.classList.add('active');
                    drawPencil.classList.remove('active');
                    drawHighlighter.classList.remove('active');
                });

                // Couleur
                drawColorPicker.addEventListener('input', (e) => {
                    drawColor = e.target.value;
                });

                // Taille
                let sliderDragging = false;
                drawSizeHandle.addEventListener('mousedown', (e) => {
                    sliderDragging = true;
                    e.stopPropagation();
                });

                document.addEventListener('mousemove', (e) => {
                    if (!sliderDragging) return;
                    const rect = drawSizeSlider.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const percent = x / rect.width;
                    drawSize = Math.round(percent * 48) + 2;
                    drawSizeHandle.style.left = `${percent * 100}%`;
                    drawSizeValue.textContent = drawSize;
                });

                document.addEventListener('mouseup', () => {
                    sliderDragging = false;
                });

                // Gestion du dessin
                drawCanvas.addEventListener('mousedown', (e) => {
                    if (!drawMode) return;
                    e.preventDefault();
                    e.stopPropagation();
                    
                    isDrawing = true;
                    const coords = getMouseScreenCoords(e);
                    lastDrawPoint = coords;
                    
                    drawCtx.beginPath();
                    drawCtx.moveTo(coords.x, coords.y);
                    
                    drawPoints.push({
                        tool: drawTool,
                        color: drawColor,
                        size: drawSize,
                        points: [{ x: coords.x, y: coords.y }]
                    });
                });

                drawCanvas.addEventListener('mousemove', (e) => {
                    if (!drawMode || !isDrawing) return;
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const coords = getMouseScreenCoords(e);
                    
                    if (lastDrawPoint) {
                        const distance = Math.hypot(coords.x - lastDrawPoint.x, coords.y - lastDrawPoint.y);
                        if (distance < 2) return;
                        
                        drawCtx.beginPath();
                        drawCtx.strokeStyle = drawTool === 'eraser' ? '#0b0b0f' : drawColor;
                        drawCtx.lineWidth = drawSize;
                        drawCtx.lineCap = 'round';
                        drawCtx.lineJoin = 'round';
                        
                        if (drawTool === 'highlighter') {
                            drawCtx.globalAlpha = 0.4;
                        } else {
                            drawCtx.globalAlpha = 1;
                        }
                        
                        drawCtx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
                        drawCtx.lineTo(coords.x, coords.y);
                        drawCtx.stroke();
                        
                        lastDrawPoint = coords;
                        
                        if (drawPoints.length > 0) {
                            drawPoints[drawPoints.length-1].points.push({ x: coords.x, y: coords.y });
                        }
                    }
                });

                drawCanvas.addEventListener('mouseup', () => {
                    isDrawing = false;
                    lastDrawPoint = null;
                    drawCtx.globalAlpha = 1;
                });

                drawCanvas.addEventListener('mouseleave', () => {
                    isDrawing = false;
                    lastDrawPoint = null;
                    drawCtx.globalAlpha = 1;
                });
            }

            // ----- RENDU D'UNE CARTE -----
            function renderCard(card, existingDiv = null) {
                const div = existingDiv || document.createElement('div');
                div.className = 'card' + (card.id === selectedCardId ? ' selected' : '');
                if (focusMode && card.id === focusCardId) div.classList.add('focus-card');
                else if (focusMode && isConnectedToFocus(card.id)) div.classList.add('connected-to-focus');
                div.id = `card-${card.id}`;
                div.style.left = `${card.x}px`;
                div.style.top = `${card.y}px`;
                
                if (card.color) {
                    if (card.color === '#ffffff') {
                        div.style.background = 'rgba(255, 255, 255, 0.85)';
                        div.style.color = '#000000';
                    } else if (card.color === '#000000') {
                        div.style.background = 'rgba(0, 0, 0, 0.85)';
                    } else {
                        const rgb = hexToRgb(card.color);
                        div.style.background = `rgba(${rgb}, 0.75)`;
                    }
                } else {
                    div.style.background = 'rgba(22, 24, 29, 0.75)';
                }
                
                div.setAttribute('data-id', card.id);

                const statusClass = card.status ? `status-${card.status}` : '';

                div.innerHTML = `
                    <div class="edit-btn" title="Éditer">✎</div>
                    <div class="card-header">
                        <span class="card-badge">${card.badge || 'IDEE'}</span>
                        <span class="card-title">${card.title}</span>
                    </div>
                    <div class="card-content">${card.content}</div>
                    <div class="card-footer">
                        <span>#${card.id}</span>
                    </div>
                    ${card.status ? `<div class="card-status ${statusClass}">${card.status}</div>` : ''}
                    <div class="connection-point north" data-card="${card.id}" data-dir="north"></div>
                    <div class="connection-point south" data-card="${card.id}" data-dir="south"></div>
                    <div class="connection-point east" data-card="${card.id}" data-dir="east"></div>
                    <div class="connection-point west" data-card="${card.id}" data-dir="west"></div>
                `;

                div.querySelector('.edit-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    startEditing(card);
                });

                div.addEventListener('mousedown', (e) => {
                    if (isEditing || drawMode || deleteLinkMode || e.target.classList.contains('edit-btn') || e.target.classList.contains('connection-point')) return;
                    
                    e.stopPropagation();
                    const world = getMouseWorldCoords(e);
                    dragOffsetX = world.x - card.x;
                    dragOffsetY = world.y - card.y;
                    draggedCard = card;
                    isDraggingCard = true;
                });

                div.addEventListener('click', (e) => {
                    if (isEditing || drawMode || deleteLinkMode || e.target.classList.contains('edit-btn') || e.target.classList.contains('connection-point')) return;
                    
                    if (selectedCardId === card.id) {
                        selectedCardId = null;
                        div.classList.remove('selected');
                    } else {
                        if (selectedCardId) {
                            document.getElementById(`card-${selectedCardId}`)?.classList.remove('selected');
                        }
                        selectedCardId = card.id;
                        div.classList.add('selected');
                    }
                });

                if (!existingDiv) {
                    container.appendChild(div);
                }
            }

            function isConnectedToFocus(cardId) {
                if (!focusCardId) return false;
                return connections.some(conn => 
                    (conn.from.cardId === focusCardId && conn.to.cardId === cardId) ||
                    (conn.to.cardId === focusCardId && conn.from.cardId === cardId)
                );
            }

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return `${r}, ${g}, ${b}`;
            }

            // ----- MISE À JOUR DE LA LISTE DES CARTES -----
            function updateCardList() {
                cardListDiv.innerHTML = '';
                cards.forEach(card => {
                    const item = document.createElement('div');
                    item.className = 'card-list-item';
                    item.innerHTML = `
                        <span class="color-dot" style="background: ${card.color || '#3498db'}"></span>
                        <span>${card.title}</span>
                    `;
                    item.addEventListener('click', () => {
                        panX = -card.x * scale + canvas.clientWidth/2 - 130*scale;
                        panY = -card.y * scale + canvas.clientHeight/2 - 80*scale;
                        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                        updateMinimap();
                        
                        if (selectedCardId) {
                            document.getElementById(`card-${selectedCardId}`)?.classList.remove('selected');
                        }
                        selectedCardId = card.id;
                        document.getElementById(`card-${card.id}`)?.classList.add('selected');
                        settingsMenu.classList.remove('visible');
                    });
                    cardListDiv.appendChild(item);
                });
            }

            // ----- ÉDITION D'UNE CARTE (améliorée) -----
            function startEditing(card) {
                isEditing = true;
                const div = document.getElementById(`card-${card.id}`);
                div.classList.add('drag-disabled');
                
                const editContainer = document.createElement('div');
                editContainer.className = 'edit-card-container';
                editContainer.innerHTML = `
                    <label>Titre</label>

                    <label>Contenu</label>

                    <label>Type de carte</label>
                    <select id="badge-select-${card.id}" class="edit-input">
                        <option value="IDEE">IDEE</option>

                        <div class="color-option" data-color="#9b59b6" style="background: #9b59b6;" title="Violet"></div>
                        <div class="color-option" data-color="#1abc9c" style="background: #1abc9c;" title="Turquoise"></div>
                        <div class="color-option white" data-color="#ffffff" style="background: #ffffff; border: 1px solid #ccc;" title="Blanc"></div>

                    <div class="edit-actions">

                `;
                
                div.innerHTML = '';
                div.appendChild(editContainer);
                
                setTimeout(() => {
                    const select = document.getElementById(`badge-select-${card.id}`);
                    if (select) select.value = card.badge || 'IDEE';
                    const statusSelect = document.getElementById(`status-select-${card.id}`);
                    if (statusSelect) statusSelect.value = card.status || '';
                    
                    document.querySelectorAll(`#color-options-${card.id} .color-option`).forEach(opt => {
                        opt.addEventListener('click', () => {
                            document.querySelectorAll(`#color-options-${card.id} .color-option`).forEach(o => o.classList.remove('selected'));
                            opt.classList.add('selected');
                            card.color = opt.dataset.color;
                        });
                        if (opt.dataset.color === (card.color || '#3498db')) {
                            opt.classList.add('selected');
                        }
                    });
                }, 0);
            }

            window.saveEdit = function(cardId) {
                const card = cards.find(c => c.id === cardId);
                if (!card) return;
                
                const titleInput = document.getElementById(`edit-title-${cardId}`);
                const contentInput = document.getElementById(`edit-content-${cardId}`);
                const badgeSelect = document.getElementById(`badge-select-${cardId}`);
                const statusSelect = document.getElementById(`status-select-${cardId}`);
                
                if (titleInput) card.title = titleInput.value || 'Sans titre';
                if (contentInput) card.content = contentInput.value || '';
                if (badgeSelect) card.badge = badgeSelect.value;
                if (statusSelect) card.status = statusSelect.value || '';
                
                isEditing = false;
                renderCard(card, document.getElementById(`card-${cardId}`));
                redrawConnections();
                updateCardList();
                updateMinimapDots();
            };

            window.cancelEdit = function(cardId) {
                const card = cards.find(c => c.id === cardId);
                isEditing = false;
                renderCard(card, document.getElementById(`card-${cardId}`));
            };

            // ----- CRÉATION D'UNE NOUVELLE CARTE -----
            function createCard(x = 0, y = 0, title = "Nouvelle carte", content = "Cliquez sur ✎ pour éditer", badge = "IDEE") {
                const id = nextId++;
                const card = {
                    id,
                    x,
                    y,
                    title,
                    content,
                    badge,
                    color: '#3498db',
                    status: '',
                    width: 260,
                    height: 160
                };
                cards.push(card);
                renderCard(card);
                updateCardList();
                updateMinimapDots();
                return card;
            }

            // ----- SUPPRESSION D'UNE CARTE -----
            function deleteSelectedCard() {
                if (!selectedCardId || isEditing || drawMode || deleteLinkMode) return;
                
                const cardToDelete = cards.find(c => c.id === selectedCardId);
                if (!cardToDelete) return;
                
                const deletedCard = { ...cardToDelete };
                const deletedConnections = connections.filter(conn => 
                    conn.from.cardId === selectedCardId || conn.to.cardId === selectedCardId
                );
                
                deletedCardsHistory.unshift({
                    card: deletedCard,
                    connections: deletedConnections
                });
                
                if (deletedCardsHistory.length > MAX_HISTORY) {
                    deletedCardsHistory.pop();
                }
                
                connections = connections.filter(conn => 
                    conn.from.cardId !== selectedCardId && conn.to.cardId !== selectedCardId
                );
                
                cards = cards.filter(c => c.id !== selectedCardId);
                document.getElementById(`card-${selectedCardId}`)?.remove();
                
                if (connectionStart?.cardId === selectedCardId) {
                    cancelConnectionDrag();
                }
                
                selectedCardId = null;
                redrawConnections();
                updateCardList();
                updateMinimapDots();
                showNotification('Carte supprimée (Ctrl+Z pour restaurer)');
            }

            // ----- RESTAURATION -----
            function restoreLastDeleted() {
                if (deletedCardsHistory.length === 0) {
                    showNotification('Aucune suppression à restaurer');
                    return;
                }
                
                const lastDeleted = deletedCardsHistory.shift();
                cards.push(lastDeleted.card);
                lastDeleted.connections.forEach(conn => {
                    conn.id = nextConnId++;
                    connections.push(conn);
                });
                renderCard(lastDeleted.card);
                redrawConnections();
                updateCardList();
                updateMinimapDots();
                showNotification('Carte restaurée');
            }

            // ----- GESTION DES CONNEXIONS (améliorée) -----
            function getClosestConnectionPoint(card, worldX, worldY) {
                const points = [
                    { dir: 'north', x: card.x + 130, y: card.y },
                    { dir: 'south', x: card.x + 130, y: card.y + 160 },
                    { dir: 'east', x: card.x + 260, y: card.y + 80 },
                    { dir: 'west', x: card.x, y: card.y + 80 }
                ];
                
                let closest = points[0];
                let minDist = Math.hypot(worldX - points[0].x, worldY - points[0].y);
                
                for (let i = 1; i < points.length; i++) {
                    const dist = Math.hypot(worldX - points[i].x, worldY - points[i].y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = points[i];
                    }
                }
                
                return closest.dir;
            }

            function startConnectionDrag(cardId, direction, element) {
                if (isDraggingConnection || isEditing || drawMode || deleteLinkMode) return;
                
                const card = cards.find(c => c.id === cardId);
                if (!card) return;
                
                let x = card.x, y = card.y;
                switch (direction) {
                    case 'north': x += 130; y += 0; break;
                    case 'south': x += 130; y += 160; break;
                    case 'east': x += 260; y += 80; break;
                    case 'west': x += 0; y += 80; break;
                }
                
                connectionStart = { cardId, direction, x, y, element };
                isDraggingConnection = true;
                element.classList.add('dragging');
                
                tempLine = document.createElement('div');
                tempLine.className = 'temp-connection-line';
                tempLine.style.left = `${x}px`;
                tempLine.style.top = `${y}px`;
                container.appendChild(tempLine);
                
                canvas.addEventListener('mousemove', onConnectionDragMove);
                canvas.addEventListener('mouseup', onConnectionDragEnd);
            }

            function onConnectionDragMove(e) {
                if (!isDraggingConnection || !tempLine || !connectionStart) return;
                
                const world = getMouseWorldCoords(e);
                const dx = world.x - connectionStart.x;
                const dy = world.y - connectionStart.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                tempLine.style.width = `${distance}px`;
                tempLine.style.transform = `rotate(${angle}deg)`;
                
                const targetCard = findCardUnderMouse(e);
                if (targetCard && targetCard.id !== connectionStart.cardId) {
                    if (currentDropTarget !== targetCard.id) {
                        if (currentDropTarget) {
                            document.getElementById(`card-${currentDropTarget}`)?.classList.remove('drop-target');
                        }
                        currentDropTarget = targetCard.id;
                        document.getElementById(`card-${targetCard.id}`)?.classList.add('drop-target');
                    }
                } else {
                    if (currentDropTarget) {
                        document.getElementById(`card-${currentDropTarget}`)?.classList.remove('drop-target');
                        currentDropTarget = null;
                    }
                }
            }

            function onConnectionDragEnd(e) {
                if (!isDraggingConnection || !tempLine || !connectionStart) {
                    cancelConnectionDrag();
                    return;
                }
                
                if (currentDropTarget) {
                    const world = getMouseWorldCoords(e);
                    const targetCard = cards.find(c => c.id === currentDropTarget);
                    if (targetCard) {
                        const closestDir = getClosestConnectionPoint(targetCard, world.x, world.y);
                        
                        connections.push({
                            id: nextConnId++,
                            from: { cardId: connectionStart.cardId, dir: connectionStart.direction },
                            to: { cardId: currentDropTarget, dir: closestDir }
                        });
                        
                        document.getElementById(`card-${currentDropTarget}`)?.classList.remove('drop-target');
                    }
                }
                
                cancelConnectionDrag();
                redrawConnections();
            }

            function cancelConnectionDrag() {
                if (connectionStart?.element) {
                    connectionStart.element.classList.remove('dragging');
                }
                
                if (tempLine) {
                    tempLine.remove();
                    tempLine = null;
                }
                
                if (currentDropTarget) {
                    document.getElementById(`card-${currentDropTarget}`)?.classList.remove('drop-target');
                    currentDropTarget = null;
                }
                
                isDraggingConnection = false;
                connectionStart = null;
                
                canvas.removeEventListener('mousemove', onConnectionDragMove);
                canvas.removeEventListener('mouseup', onConnectionDragEnd);
            }

            function findCardUnderMouse(e) {
                const world = getMouseWorldCoords(e);
                for (let i = cards.length - 1; i >= 0; i--) {
                    const card = cards[i];
                    if (world.x >= card.x && world.x <= card.x + 260 &&
                        world.y >= card.y && world.y <= card.y + 160) {
                        return card;
                    }
                }
                return null;
            }

            function redrawConnections() {
                document.querySelectorAll('.connection-line:not(.temp-connection-line)').forEach(el => el.remove());

                connections.forEach(conn => {
                    const fromCard = cards.find(c => c.id === conn.from.cardId);
                    const toCard = cards.find(c => c.id === conn.to.cardId);
                    
                    if (!fromCard || !toCard) return;

                    let fromX = fromCard.x, fromY = fromCard.y;
                    switch (conn.from.dir) {
                        case 'north': fromX += 130; fromY += 0; break;
                        case 'south': fromX += 130; fromY += 160; break;
                        case 'east': fromX += 260; fromY += 80; break;
                        case 'west': fromX += 0; fromY += 80; break;
                    }

                    let toX = toCard.x, toY = toCard.y;
                    switch (conn.to.dir) {
                        case 'north': toX += 130; toY += 0; break;
                        case 'south': toX += 130; toY += 160; break;
                        case 'east': toX += 260; toY += 80; break;
                        case 'west': toX += 0; toY += 80; break;
                    }

                    const line = document.createElement('div');
                    line.className = 'connection-line';
                    line.setAttribute('data-conn-id', conn.id);
                    
                    const deltaX = toX - fromX;
                    const deltaY = toY - fromY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const angle = Math.atan2(deltaY, deltaX) * 180 / Math.PI;

                    line.style.left = `${fromX}px`;
                    line.style.top = `${fromY}px`;
                    line.style.width = `${distance}px`;
                    line.style.transform = `rotate(${angle}deg)`;

                    line.addEventListener('click', (e) => {
                        if (deleteLinkMode) {
                            e.stopPropagation();
                            const connId = parseInt(line.getAttribute('data-conn-id'));
                            connections = connections.filter(c => c.id !== connId);
                            redrawConnections();
                            showNotification('Lien supprimé');
                        }
                    });

                    container.appendChild(line);
                });
            }

            // ----- GESTION DU CANVAS -----
            canvas.addEventListener('mousedown', (e) => {
                if (drawMode) return;
                if (isEditing || deleteLinkMode) return;
                if (e.target === canvas || e.target === container) {
                    isPanning = true;
                    lastPanX = e.clientX;
                    lastPanY = e.clientY;
                    canvas.style.cursor = 'grabbing';
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (drawMode) return;
                if (isPanning && !isEditing && !deleteLinkMode) {
                    const dx = e.clientX - lastPanX;
                    const dy = e.clientY - lastPanY;
                    panX += dx;
                    panY += dy;
                    container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                    lastPanX = e.clientX;
                    lastPanY = e.clientY;
                    updateMinimap();
                }
                
                if (isDraggingCard && draggedCard && !isEditing && !deleteLinkMode) {
                    const world = getMouseWorldCoords(e);
                    let newX = world.x - dragOffsetX;
                    let newY = world.y - dragOffsetY;
                    if (gridEnabled) {
                        newX = snapToGrid(newX);
                        newY = snapToGrid(newY);
                    }
                    draggedCard.x = newX;
                    draggedCard.y = newY;
                    updateCardPosition(draggedCard);
                    redrawConnections();
                }
            });

            canvas.addEventListener('mouseup', () => {
                if (drawMode) return;
                isPanning = false;
                isDraggingCard = false;
                draggedCard = null;
                canvas.style.cursor = 'default';
            });

            canvas.addEventListener('mouseleave', () => {
                if (drawMode) return;
                isPanning = false;
                isDraggingCard = false;
                draggedCard = null;
                cancelConnectionDrag();
            });

            canvas.addEventListener('wheel', (e) => {
                if (isEditing || deleteLinkMode) return;
                e.preventDefault();
                const zoomFactor = 1.1;
                const delta = e.deltaY > 0 ? 1/zoomFactor : zoomFactor;
                scale = Math.min(2, Math.max(0.5, scale * delta));
                container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                updateMinimap();
                
                zoomIndicator.textContent = `${Math.round(scale * 100)}%`;
                zoomIndicator.classList.add('visible');
                clearTimeout(window.zoomTimeout);
                window.zoomTimeout = setTimeout(() => {
                    zoomIndicator.classList.remove('visible');
                }, 1000);
            }, { passive: false });

            container.addEventListener('mousedown', (e) => {
                const point = e.target.closest('.connection-point');
                if (point && !isEditing && !drawMode && !deleteLinkMode) {
                    e.stopPropagation();
                    const cardId = parseInt(point.getAttribute('data-card'));
                    const dir = point.getAttribute('data-dir');
                    startConnectionDrag(cardId, dir, point);
                }
            });

            function updateCardPosition(card) {
                const div = document.getElementById(`card-${card.id}`);
                if (div) {
                    div.style.left = `${card.x}px`;
                    div.style.top = `${card.y}px`;
                }
            }

            // ----- MINI-CARTE -----
            function updateMinimap() {
                const worldWidth = 10000;
                const worldHeight = 10000;
                const viewportX = (-panX / scale) / worldWidth * 200;
                const viewportY = (-panY / scale) / worldHeight * 130;
                const viewportW = (canvas.clientWidth / scale) / worldWidth * 200;
                const viewportH = (canvas.clientHeight / scale) / worldHeight * 130;

                const vp = document.getElementById('minimap-viewport');
                vp.style.left = `${viewportX}px`;
                vp.style.top = `${viewportY}px`;
                vp.style.width = `${viewportW}px`;
                vp.style.height = `${viewportH}px`;

                updateMinimapDots();
            }

            function updateMinimapDots() {
                minimapDots.innerHTML = '';
                cards.forEach(card => {
                    const dot = document.createElement('div');
                    dot.className = 'minimap-dot';
                    const x = (card.x + 130) / 10000 * 200;
                    const y = (card.y + 80) / 10000 * 130;
                    dot.style.left = `${x}px`;
                    dot.style.top = `${y}px`;
                    dot.style.backgroundColor = card.color || '#4a9eff';
                    minimapDots.appendChild(dot);
                });
            }

            // ----- RACCOURCIS CLAVIER -----
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && !spacePressed) {
                    spacePressed = true;
                    canvas.style.cursor = 'grab';
                }
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    e.preventDefault();
                    deleteSelectedCard();
                }
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    restoreLastDeleted();
                }
                if (!isEditing && !drawMode && !deleteLinkMode) {
                    if (e.key === 'b' || e.key === 'B') {
                        const centerX = -panX / scale + (canvas.clientWidth / 2) / scale;
                        const centerY = -panY / scale + (canvas.clientHeight / 2) / scale;
                        createCard(centerX - 130, centerY - 80, 'Nouvelle carte', 'Cliquez sur ✎ pour éditer', 'IDEE');
                        e.preventDefault();
                    }
                    if (e.key === 'l' || e.key === 'L') {
                        showNotification('Mode liaison : cliquez sur un point de connexion');
                        e.preventDefault();
                    }
                    if (e.ctrlKey && e.key === 'f') {
                        e.preventDefault();
                        showNotification('Recherche (disponible dans le menu paramètres)');
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === ' ') {
                    spacePressed = false;
                    canvas.style.cursor = 'default';
                }
            });

            // ----- BOUTONS DE LA BARRE D'OUTILS -----
            document.getElementById('add-card').addEventListener('click', () => {
                if (isEditing || drawMode || deleteLinkMode) return;
                const centerX = -panX / scale + (canvas.clientWidth / 2) / scale;
                const centerY = -panY / scale + (canvas.clientHeight / 2) / scale;
                createCard(centerX - 130, centerY - 80, 'Nouvelle carte', 'Cliquez sur ✎ pour éditer', 'IDEE');
            });

            document.getElementById('delete-card').addEventListener('click', deleteSelectedCard);
            document.getElementById('history-undo').addEventListener('click', restoreLastDeleted);
            
            document.getElementById('reset-view').addEventListener('click', () => {
                if (isEditing || drawMode || deleteLinkMode) return;
                panX = 0; panY = 0; scale = 1;
                container.style.transform = `translate(0px, 0px) scale(1)`;
                updateMinimap();
                zoomIndicator.textContent = '100%';
                zoomIndicator.classList.add('visible');
                setTimeout(() => zoomIndicator.classList.remove('visible'), 1000);
            });

            document.getElementById('zoom-in').addEventListener('click', () => {
                if (isEditing || drawMode || deleteLinkMode) return;
                scale = Math.min(2, scale * 1.2);
                container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                updateMinimap();
                zoomIndicator.textContent = `${Math.round(scale * 100)}%`;
                zoomIndicator.classList.add('visible');
                setTimeout(() => zoomIndicator.classList.remove('visible'), 1000);
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                if (isEditing || drawMode || deleteLinkMode) return;
                scale = Math.max(0.5, scale / 1.2);
                container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                updateMinimap();
                zoomIndicator.textContent = `${Math.round(scale * 100)}%`;
                zoomIndicator.classList.add('visible');
                setTimeout(() => zoomIndicator.classList.remove('visible'), 1000);
            });

            document.getElementById('zoom-reset').addEventListener('click', () => {
                if (isEditing || drawMode || deleteLinkMode) return;
                scale = 1;
                container.style.transform = `translate(${panX}px, ${panY}px) scale(1)`;
                updateMinimap();
                zoomIndicator.textContent = '100%';
                zoomIndicator.classList.add('visible');
                setTimeout(() => zoomIndicator.classList.remove('visible'), 1000);
            });

            // Mode dessin amélioré
            const drawModeBtn = document.getElementById('draw-mode');
            drawModeBtn.addEventListener('click', () => {
                drawMode = !drawMode;
                drawModeBtn.classList.toggle('active', drawMode);
                drawCanvas.classList.toggle('active', drawMode);
                drawToolbar.classList.toggle('visible', drawMode);
                if (!drawMode) {
                    // Optionnel : sauvegarder le dessin
                }
            });

            // Mode focus
            const focusBtn = document.getElementById('focus-mode');
            focusBtn.addEventListener('click', () => {
                if (!selectedCardId) {
                    showNotification('Sélectionnez d\'abord une carte');
                    return;
                }
                focusMode = !focusMode;
                focusBtn.classList.toggle('active', focusMode);
                if (focusMode) {
                    focusCardId = selectedCardId;
                } else {
                    focusCardId = null;
                }
                cards.forEach(card => {
                    renderCard(card, document.getElementById(`card-${card.id}`));
                });
                if (focusMode && focusCardId) {
                    const card = cards.find(c => c.id === focusCardId);
                    if (card) {
                        panX = -card.x * scale + canvas.clientWidth/2 - 130*scale;
                        panY = -card.y * scale + canvas.clientHeight/2 - 80*scale;
                        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                        updateMinimap();
                    }
                }
            });

            // Mode suppression de lien
            const deleteLinkBtn = document.getElementById('delete-link');
            deleteLinkBtn.addEventListener('click', () => {
                deleteLinkMode = !deleteLinkMode;
                deleteLinkBtn.classList.toggle('active', deleteLinkMode);
                if (deleteLinkMode) {
                    showNotification('Cliquez sur un lien pour le supprimer');
                    document.body.classList.add('delete-link-mode');
                } else {
                    document.body.classList.remove('delete-link-mode');
                }
            });

            // ----- INITIALISATION -----
            window.addEventListener('load', () => {
                initDrawTools();
                
                createCard(-200, -150, 'Étude marché', 'Analyse concurrentielle', 'RECHERCHE');
                createCard(200, -100, 'Wireframes', 'Maquettes principales', 'DESIGN');
                createCard(50, 150, 'Budget', 'Coûts prévisionnels', 'FINANCE');
                createCard(-150, 200, 'Planning', 'Jalons du projet', 'PROJET');
                
                updateMinimap();
                window.addEventListener('resize', updateMinimap);
            });

            window.saveEdit = saveEdit;
            window.cancelEdit = cancelEdit;
        })();
    </script>
</body>
</html>
