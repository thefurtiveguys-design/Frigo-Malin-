<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdHelp - Financement sans commission</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        
        body { 
            background: #f8fafc; 
            color: #1e293b; 
            line-height: 1.5; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        
        header { 
            background: white; 
            padding: 20px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        
        h1 { 
            font-size: 24px; 
            font-weight: 600; 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .btn { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-decoration: none; 
            display: inline-block; 
        }
        
        .btn:hover { 
            background: #2563eb; 
            transform: translateY(-1px); 
            box-shadow: 0 4px 6px -1px rgba(59,130,246,0.3); 
        }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid #3b82f6; 
            color: #3b82f6; 
        }
        
        .btn-outline:hover { 
            background: #eff6ff; 
            box-shadow: none; 
            transform: none; 
        }
        
        .btn-danger { 
            background: #ef4444; 
        }
        
        .btn-danger:hover { 
            background: #dc2626; 
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            margin-bottom: 24px; 
            transition: all 0.2s; 
        }
        
        .card:hover { 
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.15); 
        }
        
        .post { 
            position: relative; 
            border-left: 4px solid transparent; 
        }
        
        .post.boosted { 
            border-left-color: #f59e0b; 
            background: linear-gradient(to right, #fff, #fffbeb); 
        }
        
        .badge { 
            background: #f59e0b; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 600; 
            display: inline-block; 
            margin-bottom: 10px; 
        }
        
        .progress-bar { 
            height: 10px; 
            background: #e2e8f0; 
            border-radius: 10px; 
            margin: 15px 0; 
            overflow: hidden; 
        }
        
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6); 
            width: 0%; 
            transition: width 0.3s; 
        }
        
        .meta { 
            color: #64748b; 
            font-size: 14px; 
            margin: 10px 0; 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
        }
        
        .flex { 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            flex-wrap: wrap; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
        }
        
        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 6px; 
            color: #334155; 
            font-size: 14px; 
        }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 14px; 
            transition: border 0.2s; 
        }
        
        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1); 
        }
        
        .auth-form { 
            max-width: 400px; 
            margin: 20px auto; 
        }
        
        .hidden { 
            display: none; 
        }
        
        #auth-message, #post-message { 
            margin-top: 15px; 
            font-size: 14px; 
        }
        
        .error { color: #ef4444; }
        .success { color: #10b981; }
        
        .contribute-form { 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #e2e8f0; 
        }
        
        .paypal-button-container { 
            margin-top: 15px; 
            min-height: 45px; 
        }
        
        h2 { 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #0f172a; 
        }
        
        /* Stats et classement */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        
        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        
        .stat-value { 
            font-size: 32px; 
            font-weight: 700; 
            color: #3b82f6; 
            margin-bottom: 5px; 
        }
        
        .stat-label { 
            font-size: 13px; 
            color: #64748b; 
            font-weight: 500; 
        }
        
        .ranking-container { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        
        .ranking-title { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 15px; 
            color: #0f172a; 
        }
        
        .ranking-list { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .ranking-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 10px; 
            background: #f8fafc; 
            border-radius: 12px; 
        }
        
        .ranking-position { 
            width: 30px; 
            height: 30px; 
            background: #3b82f6; 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 600; 
            font-size: 14px; 
        }
        
        .ranking-position.gold { background: #f59e0b; }
        .ranking-position.silver { background: #94a3b8; }
        .ranking-position.bronze { background: #b45309; }
        
        .ranking-info { 
            flex: 1; 
        }
        
        .ranking-name { 
            font-weight: 600; 
            color: #1e293b; 
        }
        
        .ranking-amount { 
            font-size: 14px; 
            color: #3b82f6; 
            font-weight: 500; 
        }
        
        .filter-bar { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            align-items: center; 
        }
        
        .filter-select { 
            width: 200px; 
        }
        
        .search-input { 
            flex: 1; 
            min-width: 250px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ CrowdHelp - Financement sans commission</h1>
            <div id="auth-buttons">
                <button class="btn" id="login-btn">Connexion</button>
                <button class="btn btn-outline" id="signup-btn">Inscription</button>
                <button class="btn btn-danger hidden" id="logout-btn">Déconnexion</button>
            </div>
        </header>

        <!-- Formulaire de connexion/inscription -->
        <div id="auth-forms" class="card auth-form hidden">
            <h2 id="auth-title">Connexion</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="auth-email" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <div class="flex">
                <button class="btn" id="auth-submit">Valider</button>
                <button class="btn btn-outline" id="auth-toggle">Créer un compte</button>
            </div>
            <div id="auth-message"></div>
        </div>

        <!-- Formulaire de création de post -->
        <div id="new-post-form" class="card hidden">
            <h2>🚀 Lancer un projet</h2>
            <div class="form-group">
                <label>Titre du projet</label>
                <input type="text" id="post-title" placeholder="Ex: Achat de chaussures de sport" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="post-description" rows="3" placeholder="Décrivez votre projet..."></textarea>
            </div>
            <div class="form-group">
                <label>Montant cible (€)</label>
                <input type="number" id="post-target" min="1" step="0.01" placeholder="150" required>
            </div>
            <div class="form-group">
                <label>Votre email PayPal (pour recevoir les dons)</label>
                <input type="email" id="post-paypal" placeholder="votre-paypal@email.com" required>
            </div>
            <button class="btn" id="submit-post">Publier le projet</button>
            <div id="post-message"></div>
        </div>

        <!-- Statistiques globales -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-projects">0</div>
                <div class="stat-label">Projets actifs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-donations">0 €</div>
                <div class="stat-label">Total des dons</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-contributors">0</div>
                <div class="stat-label">Contributeurs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-donation">0 €</div>
                <div class="stat-label">Don moyen</div>
            </div>
        </div>

        <!-- Classement des contributeurs -->
        <div class="ranking-container">
            <h3 class="ranking-title">🏆 Top contributeurs</h3>
            <div class="ranking-list" id="ranking-list">
                <!-- Rempli dynamiquement -->
            </div>
        </div>

        <!-- Filtres -->
        <div class="filter-bar">
            <select class="filter-select" id="sort-filter">
                <option value="boosted">🔥 Boostés d'abord</option>
                <option value="recent">📅 Plus récents</option>
                <option value="popular">⭐ Plus populaires</option>
                <option value="progress">📊 Progression</option>
            </select>
            <input type="text" class="search-input" id="search-filter" placeholder="🔍 Rechercher un projet...">
        </div>

        <!-- Liste des posts -->
        <div id="posts-container">
            <h2>📋 Projets en cours</h2>
            <div id="posts-list"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://ylrseemuvxogyopwqrnr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscnNlZW11dnhvZ3lvcHdycW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDA1MzIsImV4cCI6MjA4ODExNjUzMn0.Bc1yhbVNbLGU_bMQBjecXe0Is-WtZMWXALcW-oWYkPA';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Configuration PayPal
        const PAYPAL_CLIENT_ID = 'sb_publishable_8u_JaumkXWYakzViVJRH5g_DIB0fs_i';

        // État global
        let currentUser = null;
        let isLoginMode = true;
        let allPosts = [];
        let allContributions = [];

        // Éléments DOM
        const authButtons = document.getElementById('auth-buttons');
        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authForms = document.getElementById('auth-forms');
        const authTitle = document.getElementById('auth-title');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authSubmit = document.getElementById('auth-submit');
        const authToggle = document.getElementById('auth-toggle');
        const authMessage = document.getElementById('auth-message');
        const newPostForm = document.getElementById('new-post-form');
        const postTitle = document.getElementById('post-title');
        const postDescription = document.getElementById('post-description');
        const postTarget = document.getElementById('post-target');
        const postPaypal = document.getElementById('post-paypal');
        const submitPost = document.getElementById('submit-post');
        const postMessage = document.getElementById('post-message');
        const postsList = document.getElementById('posts-list');
        const sortFilter = document.getElementById('sort-filter');
        const searchFilter = document.getElementById('search-filter');

        // Éléments stats
        const totalProjectsEl = document.getElementById('total-projects');
        const totalDonationsEl = document.getElementById('total-donations');
        const totalContributorsEl = document.getElementById('total-contributors');
        const avgDonationEl = document.getElementById('avg-donation');
        const rankingListEl = document.getElementById('ranking-list');

        // ========== AUTHENTIFICATION ==========
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            updateUI();
            loadData();
        }
        checkUser();

        function updateUI() {
            if (currentUser) {
                loginBtn.classList.add('hidden');
                signupBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                newPostForm.classList.remove('hidden');
                authForms.classList.add('hidden');
            } else {
                loginBtn.classList.remove('hidden');
                signupBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                newPostForm.classList.add('hidden');
            }
        }

        loginBtn.addEventListener('click', () => {
            isLoginMode = true;
            authTitle.textContent = 'Connexion';
            authForms.classList.remove('hidden');
        });

        signupBtn.addEventListener('click', () => {
            isLoginMode = false;
            authTitle.textContent = 'Inscription';
            authForms.classList.remove('hidden');
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            currentUser = null;
            updateUI();
            loadData();
        });

        authToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.textContent = isLoginMode ? 'Connexion' : 'Inscription';
        });

        authSubmit.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            
            if (!email || !password) {
                authMessage.textContent = 'Veuillez remplir tous les champs';
                authMessage.className = 'error';
                return;
            }

            let result;
            if (isLoginMode) {
                result = await supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await supabase.auth.signUp({ email, password });
            }

            if (result.error) {
                authMessage.textContent = result.error.message;
                authMessage.className = 'error';
            } else {
                if (isLoginMode) {
                    currentUser = result.data.user;
                    authMessage.textContent = 'Connexion réussie !';
                    authMessage.className = 'success';
                    updateUI();
                    authForms.classList.add('hidden');
                } else {
                    authMessage.textContent = 'Inscription réussie ! Vérifiez votre email.';
                    authMessage.className = 'success';
                }
                authEmail.value = '';
                authPassword.value = '';
            }
        });

        // ========== CHARGEMENT DES DONNÉES ==========
        async function loadData() {
            // Charger tous les posts
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erreur chargement posts:', error);
                return;
            }

            // Charger toutes les contributions
            const { data: contributions, error: contribError } = await supabase
                .from('contributions')
                .select('*')
                .order('created_at', { ascending: false });

            if (contribError) {
                console.error('Erreur chargement contributions:', contribError);
                return;
            }

            allContributions = contributions || [];
            
            // Calculer les totaux par post
            const postsWithTotal = posts.map(post => {
                const postContributions = allContributions.filter(c => c.post_id === post.id);
                const total = postContributions.reduce((acc, c) => acc + parseFloat(c.amount), 0);
                return { ...post, total, contributions: postContributions };
            });

            allPosts = postsWithTotal;
            updateStats();
            applyFilters();
        }

        // ========== STATISTIQUES GLOBALES ==========
        function updateStats() {
            // Nombre de projets actifs
            totalProjectsEl.textContent = allPosts.length;

            // Total des dons
            const totalDonations = allContributions.reduce((acc, c) => acc + parseFloat(c.amount), 0);
            totalDonationsEl.textContent = totalDonations.toFixed(2) + ' €';

            // Nombre de contributeurs uniques
            const uniqueContributors = new Set(allContributions.map(c => c.contributor_name)).size;
            totalContributorsEl.textContent = uniqueContributors;

            // Don moyen
            const avgDonation = allContributions.length > 0 ? totalDonations / allContributions.length : 0;
            avgDonationEl.textContent = avgDonation.toFixed(2) + ' €';

            // Classement des contributeurs
            const contributorTotals = {};
            allContributions.forEach(c => {
                const name = c.contributor_name || 'Anonyme';
                contributorTotals[name] = (contributorTotals[name] || 0) + parseFloat(c.amount);
            });

            const ranking = Object.entries(contributorTotals)
                .map(([name, total]) => ({ name, total }))
                .sort((a, b) => b.total - a.total)
                .slice(0, 10); // Top 10

            rankingListEl.innerHTML = ranking.map((item, index) => {
                let positionClass = '';
                if (index === 0) positionClass = 'gold';
                else if (index === 1) positionClass = 'silver';
                else if (index === 2) positionClass = 'bronze';
                
                return `
                    <div class="ranking-item">
                        <div class="ranking-position ${positionClass}">${index + 1}</div>
                        <div class="ranking-info">
                            <div class="ranking-name">${item.name}</div>
                            <div class="ranking-amount">${item.total.toFixed(2)} €</div>
                        </div>
                    </div>
                `;
            }).join('');

            if (ranking.length === 0) {
                rankingListEl.innerHTML = '<p style="text-align: center; color: #64748b; padding: 20px;">Aucun contributeur pour le moment</p>';
            }
        }

        // ========== FILTRES ==========
        function applyFilters() {
            let filtered = [...allPosts];
            
            // Filtre recherche
            const searchTerm = searchFilter.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(post => 
                    post.title.toLowerCase().includes(searchTerm) || 
                    post.description.toLowerCase().includes(searchTerm)
                );
            }

            // Tri
            const sortValue = sortFilter.value;
            filtered.sort((a, b) => {
                const aBoosted = a.boost_expires_at && new Date(a.boost_expires_at) > new Date();
                const bBoosted = b.boost_expires_at && new Date(b.boost_expires_at) > new Date();
                
                switch(sortValue) {
                    case 'boosted':
                        if (aBoosted && !bBoosted) return -1;
                        if (!aBoosted && bBoosted) return 1;
                        return new Date(b.created_at) - new Date(a.created_at);
                    
                    case 'recent':
                        return new Date(b.created_at) - new Date(a.created_at);
                    
                    case 'popular':
                        const aContrib = allContributions.filter(c => c.post_id === a.id).length;
                        const bContrib = allContributions.filter(c => c.post_id === b.id).length;
                        return bContrib - aContrib;
                    
                    case 'progress':
                        const aProgress = (a.total / a.target_amount) * 100;
                        const bProgress = (b.total / b.target_amount) * 100;
                        return bProgress - aProgress;
                    
                    default:
                        return 0;
                }
            });

            displayPosts(filtered);
        }

        sortFilter.addEventListener('change', applyFilters);
        searchFilter.addEventListener('input', applyFilters);

        // ========== CRÉATION DE PROJET ==========
        submitPost.addEventListener('click', async () => {
            if (!currentUser) {
                postMessage.textContent = 'Vous devez être connecté';
                postMessage.className = 'error';
                return;
            }

            const title = postTitle.value.trim();
            const description = postDescription.value.trim();
            const target = parseFloat(postTarget.value);
            const paypal = postPaypal.value.trim();

            if (!title || !description || !target || !paypal) {
                postMessage.textContent = 'Tous les champs sont requis';
                postMessage.className = 'error';
                return;
            }

            if (target <= 0) {
                postMessage.textContent = 'Le montant doit être positif';
                postMessage.className = 'error';
                return;
            }

            const { error } = await supabase.from('posts').insert([
                {
                    user_id: currentUser.id,
                    title,
                    description,
                    target_amount: target,
                    paypal_email: paypal,
                }
            ]);

            if (error) {
                postMessage.textContent = error.message;
                postMessage.className = 'error';
            } else {
                postMessage.textContent = 'Projet créé avec succès !';
                postMessage.className = 'success';
                postTitle.value = '';
                postDescription.value = '';
                postTarget.value = '';
                postPaypal.value = '';
                loadData();
            }
        });

        // ========== AFFICHAGE DES PROJETS ==========
        function displayPosts(posts) {
            if (posts.length === 0) {
                postsList.innerHTML = '<p style="text-align: center; padding: 40px; color: #64748b;">Aucun projet trouvé.</p>';
                return;
            }

            postsList.innerHTML = posts.map(post => {
                const progress = Math.min((post.total / post.target_amount) * 100, 100);
                const isBoosted = post.boost_expires_at && new Date(post.boost_expires_at) > new Date();
                const daysLeft = isBoosted ? Math.ceil((new Date(post.boost_expires_at) - new Date()) / (1000 * 60 * 60 * 24)) : 0;
                const contributorCount = allContributions.filter(c => c.post_id === post.id).length;
                
                return `
                    <div class="card post ${isBoosted ? 'boosted' : ''}" data-id="${post.id}" data-paypal="${post.paypal_email}" data-title="${post.title}">
                        <div class="flex" style="justify-content: space-between;">
                            <h3 style="font-size: 18px;">${post.title}</h3>
                            ${isBoosted ? '<span class="badge">🔥 Boosté (' + daysLeft + 'j)</span>' : ''}
                        </div>
                        <p style="color: #475569; margin: 10px 0;">${post.description}</p>
                        
                        <div class="meta">
                            <span>🎯 Objectif: ${post.target_amount} €</span>
                            <span>💰 Récolté: ${post.total.toFixed(2)} €</span>
                            <span>👥 ${contributorCount} contributeur${contributorCount > 1 ? 's' : ''}</span>
                            <span>📅 ${new Date(post.created_at).toLocaleDateString()}</span>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>

                        <div class="flex" style="justify-content: space-between; margin-top: 15px;">
                            <button class="btn contribute-btn">Contribuer à ce projet</button>
                            <button class="btn btn-outline boost-btn" data-post-id="${post.id}">Booster (5€)</button>
                        </div>

                        <div class="contribute-form hidden">
                            <h4 style="margin-bottom: 15px;">Faire un don</h4>
                            <div class="form-group">
                                <label>Montant (€)</label>
                                <input type="number" class="contribute-amount" min="1" step="0.01" placeholder="10">
                            </div>
                            <div class="form-group">
                                <label>Votre nom (optionnel)</label>
                                <input type="text" class="contributor-name" placeholder="Anonyme">
                            </div>
                            <div class="paypal-button-container" id="paypal-button-${post.id}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Ajouter les écouteurs pour les boutons "Contribuer"
            document.querySelectorAll('.contribute-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.post');
                    const form = card.querySelector('.contribute-form');
                    form.classList.toggle('hidden');
                    
                    // Initialiser PayPal quand le formulaire est visible
                    if (!form.classList.contains('hidden')) {
                        const postId = card.dataset.id;
                        const paypalEmail = card.dataset.paypal;
                        const postTitle = card.dataset.title;
                        initPayPalButton(postId, paypalEmail, postTitle);
                    }
                });
            });

            // Boutons "Booster"
            document.querySelectorAll('.boost-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.postId;
                    
                    const boostAmount = 5;
                    const sitePaypal = 'sb-paypal@crowdhelp.com';
                    
                    const paypalUrl = `https://www.sandbox.paypal.com/cgi-bin/webscr?cmd=_donations&business=${sitePaypal}&item_name=Boost%20projet%20${postId}&amount=${boostAmount}&currency_code=EUR`;
                    
                    window.open(paypalUrl, '_blank');

                    const expiresAt = new Date();
                    expiresAt.setHours(expiresAt.getHours() + 24);
                    
                    const { error } = await supabase
                        .from('posts')
                        .update({ boost_expires_at: expiresAt.toISOString() })
                        .eq('id', postId);

                    if (!error) {
                        loadData();
                    }
                });
            });
        }

        // ========== INITIALISATION PAYPAL ==========
        function initPayPalButton(postId, paypalEmail, postTitle) {
            const container = document.getElementById(`paypal-button-${postId}`);
            if (!container) return;

            container.innerHTML = '';

            const card = document.querySelector(`.post[data-id="${postId}"]`);
            const amountInput = card.querySelector('.contribute-amount');
            const nameInput = card.querySelector('.contributor-name');

            const button = document.createElement('button');
            button.className = 'btn';
            button.textContent = 'Payer avec PayPal';
            button.style.background = '#00457C';
            button.style.width = '100%';
            button.style.padding = '12px';
            
            button.addEventListener('click', () => {
                const amount = parseFloat(amountInput.value);
                if (!amount || amount < 1) {
                    alert('Veuillez saisir un montant valide (minimum 1€)');
                    return;
                }

                const name = nameInput.value.trim() || 'Anonyme';

                const paypalUrl = `https://www.sandbox.paypal.com/cgi-bin/webscr?cmd=_donations&business=${paypalEmail}&item_name=${encodeURIComponent(postTitle)}&amount=${amount}&currency_code=EUR`;
                
                window.open(paypalUrl, '_blank');

                saveContribution(postId, amount, name);
            });

            container.appendChild(button);
        }

        // ========== ENREGISTRER UNE CONTRIBUTION ==========
        async function saveContribution(postId, amount, contributorName) {
            const { error } = await supabase.from('contributions').insert([
                { 
                    post_id: postId, 
                    amount: amount, 
                    contributor_name: contributorName 
                }
            ]);

            if (!error) {
                loadData();
            }
        }

        // ========== INITIALISATION ==========
        window.addEventListener('load', () => {
            loadData();
        });
    </script>
</body>
</html>
